
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font-sans)}
input,select{width:100%;padding:9px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--color-border-info);box-shadow:0 0 0 2px rgba(24,95,165,0.12)}
button{font-family:var(--font-sans);font-size:13px;cursor:pointer;padding:7px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button:hover{background:var(--color-background-secondary)}
button:active{opacity:0.8}
.bp{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:500}.bp:hover{background:#0C447C}
.bd{background:var(--color-background-danger);color:var(--color-text-danger);border-color:var(--color-border-danger)}
.bsuc{background:var(--color-background-success);color:var(--color-text-success);border-color:var(--color-border-success)}
.bs{padding:6px 10px;font-size:12px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.1rem}
.lbl{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;font-weight:500}
.fg{margin-bottom:14px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tab{padding:8px 12px;border:none;background:none;cursor:pointer;font-size:13px;border-bottom:2px solid transparent;color:var(--color-text-secondary);border-radius:0;white-space:nowrap}
.tab.on{color:var(--color-text-info);border-bottom-color:#185FA5;font-weight:500}
.tab:hover:not(.on){background:var(--color-background-secondary)}
.tab-bar-wrap{display:flex;overflow-x:auto;border-bottom:0.5px solid var(--color-border-tertiary);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar-wrap::-webkit-scrollbar{display:none}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:5px 8px;text-align:left;font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary)}
td{padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;font-size:11px;padding:1px 7px;border-radius:20px;font-weight:500}
.bb{background:#E6F1FB;color:#0C447C}.bg2{background:#EAF3DE;color:#27500A}
.ba{background:#FAEEDA;color:#633806}.br{background:#FCEBEB;color:#791F1F}
.bam{background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595}
.bok{background:#EAF3DE;color:#3B6D11;border:0.5px solid #97C459}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center}
.metric .v{font-size:22px;font-weight:500}.metric .l{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
.err{background:var(--color-background-danger);color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);padding:7px 10px;font-size:12px;margin-bottom:10px}
.ok{background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-md);padding:7px 10px;font-size:12px;margin-bottom:10px}
.sl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-secondary);margin-bottom:8px}
.empty{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:13px}
.alert-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:var(--border-radius-md);margin-bottom:6px;font-size:12px}
.alert-high{background:#FCEBEB;border:0.5px solid #F09595}
.alert-med{background:#FAEEDA;border:0.5px solid #FAC775}
.export-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:14px;border:0.5px solid var(--color-border-tertiary)}
.datetime-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:14px}
.field-error{border-color:#E24B4A!important;box-shadow:0 0 0 2px rgba(226,75,74,0.15)!important}
.field-error-msg{font-size:11px;color:#A32D2D;margin-top:3px;display:flex;align-items:center;gap:3px}
.req-star{color:#E24B4A;margin-left:2px}
.toast-popup{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 18px;border-radius:var(--border-radius-lg);font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,0.18);animation:toastIn .25s ease;width:90%;max-width:420px}
.toast-success-pop{background:#EAF3DE;color:#27500A;border:0.5px solid #97C459}
.toast-fail-pop{background:#FCEBEB;color:#791F1F;border:0.5px solid #F09595}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.datetime-box.field-error-box{border-color:#E24B4A!important;box-shadow:0 0 0 2px rgba(226,75,74,0.15)}
.live-clock{font-size:26px;font-weight:500;letter-spacing:0.04em;color:var(--color-text-primary);font-variant-numeric:tabular-nums}
.live-date{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.time-slots{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.time-slot{padding:7px 14px;font-size:13px;border-radius:20px;border:0.5px solid var(--color-border-secondary);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);min-width:64px;text-align:center;-webkit-tap-highlight-color:transparent}
.time-slot:hover{border-color:var(--color-border-info);color:var(--color-text-info)}
.time-slot.selected{background:#185FA5;color:#fff;border-color:#185FA5}
.time-slot.custom-active{background:#0F6E56;color:#fff;border-color:#0F6E56}
.filter-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:end;padding:10px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary)}
.filter-info{font-size:11px;padding:4px 8px;background:var(--color-background-info);color:var(--color-text-info);border-radius:var(--border-radius-md);align-self:flex-end}
#root{padding:0 0 2rem}

/* ── MOBILE BREAKPOINT ── */
@media(max-width:600px){
  input,select{font-size:16px;padding:10px 12px} /* 16px prevents iOS zoom */
  button{padding:9px 14px;font-size:13px}
  .bs{padding:8px 12px;font-size:13px}
  .card{padding:.9rem}
  .r2{grid-template-columns:1fr} /* stack 2-col grids */
  .r3{grid-template-columns:1fr} /* stack 3-col grids */
  .metrics-grid{grid-template-columns:1fr 1fr} /* 2x2 on mobile */
  .live-clock{font-size:32px}
  .live-date{font-size:13px}
  .time-slot{padding:9px 14px;font-size:13px;min-width:70px}
  .tab{padding:10px 12px;font-size:12px}
  .export-bar{flex-direction:column;align-items:stretch}
  .export-bar button,.export-bar span{width:100%;text-align:center}
  .filter-bar{flex-direction:column}
  .filter-bar>div{width:100%}
  .filter-bar select{width:100%}
  .alert-row{flex-direction:column;gap:6px}
  .topbar-btns{flex-wrap:wrap}
  .topbar-btns button{flex:1;min-width:80px;text-align:center;justify-content:center}
  th{font-size:10px;padding:4px 6px}
  td{font-size:11px;padding:5px 6px}
  .metric .v{font-size:18px}
  .metric{padding:10px 6px}
}
</style>

// type: '33inc'=33KV incomer, '33out'=33KV outgoing, '11trafo'=11KV trafo, '11out'=11KV outgoing
const FEEDER_META={
  'INCOMER 1_8F1': {type:'33inc',  voltage:33},
  'INCOMER 2_8F2': {type:'33inc',  voltage:33},

  'FDR A09':       {type:'11out',  voltage:11},
};

// Get last recorded KV for incomers or trafos on the same date
function getRefKV(sub,date,voltLevel){
  const refType=voltLevel===33?['33inc']:['11trafo'];
  const matches=DB.submissions.filter(s=>
    s.sub===sub && s.date===date && refType.includes((FEEDER_META[s.feeder]||{}).type) && s.kv
  );
  if(!matches.length)return voltLevel; // fallback to nominal
  return matches[matches.length-1].kv;
}

// ── SHA-256 via Web Crypto (built into all modern browsers) ──
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── Login lockout state (in-memory, resets on page reload) ──
const LOCKOUT={attempts:{},lockedUntil:{}};
const MAX_ATTEMPTS=3, LOCKOUT_MS=5*60*1000; // 5 minutes

function isLocked(username){
  const u=username.toLowerCase();
  if(LOCKOUT.lockedUntil[u]&&Date.now()<LOCKOUT.lockedUntil[u])return true;
  if(LOCKOUT.lockedUntil[u]&&Date.now()>=LOCKOUT.lockedUntil[u]){
    delete LOCKOUT.lockedUntil[u];delete LOCKOUT.attempts[u];
  }
  return false;
}
function recordFail(username){
  const u=username.toLowerCase();
  LOCKOUT.attempts[u]=(LOCKOUT.attempts[u]||0)+1;
  if(LOCKOUT.attempts[u]>=MAX_ATTEMPTS){
    LOCKOUT.lockedUntil[u]=Date.now()+LOCKOUT_MS;
    delete LOCKOUT.attempts[u];
  }
}
function recordSuccess(username){
  const u=username.toLowerCase();
  delete LOCKOUT.attempts[u];delete LOCKOUT.lockedUntil[u];
}
function lockoutMsg(username){
  const u=username.toLowerCase();
  const rem=Math.ceil((LOCKOUT.lockedUntil[u]-Date.now())/1000);
  const mins=Math.floor(rem/60),secs=rem%60;
  return`Account locked after ${MAX_ATTEMPTS} failed attempts. Try again in ${mins}m ${secs}s.`;
}
function remainingAttempts(username){
  const u=username.toLowerCase();
  return MAX_ATTEMPTS-(LOCKOUT.attempts[u]||0);
}

/* ══════════════════════════════════════════════════
   OFFLINE SYNC QUEUE ENGINE
   Every entry carries synced:true/false.
   Auto-retries: on connectivity restore, every 2 min,
   on login, and after every save attempt.
   ══════════════════════════════════════════════════ */
let SYNC_RUNNING=false;
let SYNC_TIMER=null;
const SYNC_INTERVAL_MS=2*60*1000; // retry every 2 minutes

function pendingEntries(){return DB.submissions.filter(s=>s.synced===false);}
function pendingCount(){return pendingEntries().length;}

// Returns plain date/time strings for an entry (handles old entries lacking them)
function entryDateTime(s){
  let date=s.date,time=s.time;
  if(!date||!time){
    const ts=s.ts||'';
    const dp=ts.substring(0,10);
    const tp=ts.substring(11,16);
    if(dp){const p=dp.split('-');date=`${p[2]}/${p[1]}/${p[0]}`;}else date='';
    time=tp||'';
  }
  return{date,time};
}

async function uploadEntry(s){
  const{date,time}=entryDateTime(s);
  await fetch(SHEETS_URL,{
    method:'POST',mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      id:s.id, date, time, user:s.user,
      district:s.district, sub:s.sub, feeder:s.feeder,
      feederType:s.feederType||feederType(s.feeder),
      kv:s.kv!=null?s.kv:'',
      ir:s.ir, iy:s.iy, ib:s.ib,
      imax:s.imax, mw:s.mw!=null?s.mw:'',
      tap:s.tap!=null?s.tap:'',
      oiltemp:s.oiltemp!=null?s.oiltemp:'',
      windtemp:s.windtemp!=null?s.windtemp:'',
      remarks:s.remarks||''
    })
  });
}

// Process all pending entries; returns {ok, fail}
async function processSyncQueue(){
  if(SYNC_RUNNING)return{ok:0,fail:0,skipped:true};
  if(!navigator.onLine)return{ok:0,fail:pendingCount()};
  SYNC_RUNNING=true;
  let ok=0,fail=0;
  try{
    for(const s of pendingEntries()){
      try{
        await uploadEntry(s);
        s.synced=true;
        ok++;
      }catch(e){fail++;}
    }
    if(ok>0)save();
  }finally{SYNC_RUNNING=false;}
  updateSyncBadge();
  return{ok,fail};
}

// Visible status badge (shown in topbar on all pages)
function syncBadgeHTML(){

// 33KV_INCOMER: KV + IR,IY,IB → Imax,MW
// 33KV_OUT:     IR,IY,IB → Imax,MW (uses latest INCOMER KV)
// 11KV_TRAFO:   KV + IR,IY,IB → Imax,MW + TAP(0-19) + OilTemp + WindTemp
// 11KV_OUT:     IR,IY,IB → Imax,MW (uses latest TRAFO KV)
const FEEDER_TYPES={
  'INCOMER 1_8F1':'33KV_INCOMER','INCOMER 2_8F2':'33KV_INCOMER','INCOMER 3_8F3':'33KV_INCOMER',
  'INCHABAN 1':'33KV_OUT','INCHABAN 2':'33KV_OUT',
  'FREEZONE 1':'33KV_OUT','FREEZONE 2':'33KV_OUT',
  'TADI 1':'33KV_OUT','TADI 2':'33KV_OUT',
  'APOWA 1':'33KV_OUT','APOWA 2':'33KV_OUT',
  'TRAFO 1':'11KV_TRAFO','TRAFO 2':'11KV_TRAFO',
  'FDR A55':'11KV_OUT','FDR A31':'11KV_OUT','FDR A NTANKOFUL':'11KV_OUT',
  'FDR A44':'11KV_OUT','FDR A10':'11KV_OUT','FDR A13':'11KV_OUT',
  'FDR A41':'11KV_OUT','FDR A57':'11KV_OUT','FDR A09':'11KV_OUT'
};

function feederType(f){return FEEDER_TYPES[f]||'33KV_OUT';}
function is33Incomer(f){return feederType(f)==='33KV_INCOMER';}
function is33Out(f){return feederType(f)==='33KV_OUT';}
function is11Trafo(f){return feederType(f)==='11KV_TRAFO';}
function is11Out(f){return feederType(f)==='11KV_OUT';}

// Get latest KV reading for a given feeder type (for MW calc on outgoing feeders)
function latestKV(substation, type){
  const src=type==='33KV'?['33KV_INCOMER']:['11KV_TRAFO'];
  const rows=DB.submissions
    .filter(s=>s.sub===substation && src.includes(feederType(s.feeder)) && s.kv)
    .sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  return rows.length?rows[0].kv:null;
}

// Imax = max of IR,IY,IB
function calcImax(ir,iy,ib){
  const vals=[ir,iy,ib].map(Number).filter(x=>!isNaN(x)&&x!=='');
  return vals.length?Math.max(...vals):0;
}

// MW = √3 × kV × Imax × pf / 1000  (pf = 0.96)
function calcMW(kv,imax){
  if(!kv||!imax)return null;
  return+(Math.sqrt(3)*kv*imax*0.96/1000).toFixed(3);
}

/* Build a timestamp: real today's date + chosen time slot */
function buildDateAndTime(){
  const now=new Date();
  const year=now.getFullYear();
  const month=String(now.getMonth()+1).padStart(2,'0');
  const day=String(now.getDate()).padStart(2,'0');
  let hh,mm;
  if(useCustomTime){
    const ct=v('custom-time');
    if(!ct){hh=now.getHours();mm=now.getMinutes();}
    else{[hh,mm]=ct.split(':').map(Number);}
  } else if(selectedTime!==null){
    hh=TIME_SLOTS[selectedTime].h;
    mm=TIME_SLOTS[selectedTime].m;
  } else {
    hh=now.getHours();
    mm=now.getMinutes();
  }
  const hhStr=String(hh).padStart(2,'0');
  const mmStr=String(mm).padStart(2,'0');
  return {
    date:`${day}/${month}/${year}`,          // e.g. 11/06/2026
    time:`${hhStr}:${mmStr}`,                // e.g. 17:00
    ts:`${year}-${month}-${day}T${hhStr}:${mmStr}:00.000`  // for local display only
  };
}

async function doLogin(){
  const u=v('lu').trim(),p=v('lp');
  if(!u||!p){showLogin('Please enter username and password.');return;}

  // Check lockout
  if(isLocked(u)){showLogin(lockoutMsg(u));return;}

  const hashed=await sha256(p);
  const found=DB.users.find(x=>x.id.toLowerCase()===u.toLowerCase()&&x.pw===hashed);

  if(!found){
    recordFail(u);
    if(isLocked(u)){
      showLogin(lockoutMsg(u));
    } else {
      const rem=remainingAttempts(u);
      showLogin(`Incorrect username or password. ${rem} attempt${rem!==1?'s':''} remaining before lockout.`);
    }
    return;
  }
  recordSuccess(u);
  SESSION=found;selectedTime=null;useCustomTime=false;SESSION_BATCH=[];BATCH_TIME=null;BATCH_SUB=null;BATCH_NEXT_FEEDER=null;
  found.role==='admin'?showAdmin():showForm();
  // Flush any pending offline entries on login
  processSyncQueue().then(r=>{
    if(r.ok>0)showToast(true,`${r.ok} pending entr${r.ok===1?'y':'ies'} from previous session uploaded to Google Sheet`);
  });
}

function topbar(title){
  return`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;padding:0">
    <div style="display:flex;align-items:center;gap:10px">
      <img src="${ECG_LOGO}" alt="ECG Logo" style="width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,0.15)">
      <div><div class="sl" style="margin-bottom:1px">Substation Load System</div><div style="font-size:15px;font-weight:500">${title}</div></div>
    </div>
    <div class="topbar-btns" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      ${syncBadgeHTML()}
      ${SESSION.role==='user'?`<button class="bs" onclick="showForm()"><span aria-hidden="true">✎</span> Entry</button><button class="bs" onclick="showHistory()"><span aria-hidden="true">🕒</span> History</button>`:''}
      <button class="bs" onclick="showChangePw()"><span aria-hidden="true">🔒</span> Password</button>
      <button class="bs bd" onclick="SESSION=null;showLogin()">Sign out</button>
    </div>
  </div>`;
}

function showChangePw(msg,err){
  mount(`<div style="max-width:400px;margin:0 auto;padding:1.2rem 1rem">
  ${topbar('Change password')}
  <div class="card">
    <div class="sl">Update your credentials</div>
    ${err?`<div class="err">${err}</div>`:''}${msg?`<div class="ok">${msg}</div>`:''}
    <div class="fg"><label class="lbl">Full Name</label><input id="cname" value="${SESSION.name||''}" placeholder="e.g. Kwame Asante"></div>

  </div></div>`);

async function doChangePw(){
  const nu=v('cu').trim().toUpperCase(),cp=v('cp'),np=v('np'),cn=v('cnp'),phone=v('cphone').trim(),name=v('cname').trim();
  if(!nu){showChangePw('','Username cannot be empty.');return;}
  const hashedCurrent=await sha256(cp);
  if(hashedCurrent!==SESSION.pw){showChangePw('','Current password is incorrect.');return;}

  // If only updating phone (no new password entered), allow without password change
  const idx=DB.users.findIndex(u=>u.id===SESSION.id);
  if(np||cn){
    if(np.length<6){showChangePw('','New password must be at least 6 characters.');return;}
    if(np!==cn){showChangePw('','Passwords do not match.');return;}
    DB.users[idx].pw=await sha256(np);
  }
  if(nu!==SESSION.id&&DB.users.find(u=>u.id===nu)){showChangePw('','Username already taken.');return;}
  DB.submissions.forEach(s=>{if(s.user===SESSION.id)s.user=nu;});
  DB.users[idx].id=nu;
  DB.users[idx].name=name;
  if(!DB.users[idx].substations)DB.users[idx].substations=DB.users[idx].districts||[];
  DB.users[idx].phone=phone;
  SESSION=DB.users[idx];save();
  showChangePw('Credentials updated successfully. You are still signed in.','');
}

function calcAuto(){
  const feeder=v('ff');
  const m=FEEDER_META[feeder]||{type:'33out'};
  const t=m.type;
  const ir=parseFloat(v('fir'))||0;
  const iy=parseFloat(v('fiy'))||0;
  const ib=parseFloat(v('fib'))||0;
  const imax=calcImax(ir,iy,ib);
  const imaxEl=g('fimax'),mwEl=g('fmw');
  if(imaxEl)imaxEl.value=imax||'';
  if(mwEl&&imax){
    let kv;
    if(t==='33inc'||t==='11trafo'){kv=parseFloat(v('fkv'))||0;}
    else if(t==='33out'){
      const{date}=buildDateAndTime();
      kv=getRefKV(v('fs'),date,33);
    }else{
      const{date}=buildDateAndTime();
      kv=getRefKV(v('fs'),date,11);
    }
    mwEl.value=kv?calcMW(kv,imax):'';
  }else if(mwEl){mwEl.value='';}
}

      <div class="r3">${numInput('fir','IR (A)','0.0')}${numInput('fiy','IY (A)','0.0')}${numInput('fib','IB (A)','0.0')}</div>
      <div class="r2">${readOnly('fimax','Imax (A)')}${readOnly('fmw','MW')}</div>
    </div>`;
  }
  calcLive();
}

// ── Live Imax and MW calculation as user types ──
function calcLive(){
  const feeder=v('ff');
  const type=feederType(feeder);
  const ir=parseFloat(v('fir')),iy=parseFloat(v('fiy')),ib=parseFloat(v('fib'));
  const imax=calcImax(isNaN(ir)?0:ir, isNaN(iy)?0:iy, isNaN(ib)?0:ib);
  const imaxEl=g('fimax'),mwEl=g('fmw');
  if(imaxEl)imaxEl.value=(imax||'').toString();

  let kv=null;
  if(type==='33KV_INCOMER'||type==='11KV_TRAFO'){
    kv=parseFloat(v('fkv'))||null;
  } else if(type==='33KV_OUT'){
    kv=latestKVFromBatch(v('fs'),'33KV');
  } else if(type==='11KV_OUT'){
    kv=latestKVFromBatch(v('fs'),'11KV');
  }
  const mw=calcMW(kv,imax);
  if(mwEl)mwEl.value=kv&&imax?mw.toString():'—';
}

function clearErr(id){

function showToast(success,msg){

  const t=document.createElement('div');

  t.className='toast-popup '+(success?'toast-success-pop':'toast-fail-pop');

async function doSave(goNext){
  const s=v('fs'),f=v('ff');
  const d=Object.entries(DB.subs).find(([dist,subs])=>subs.includes(s))?.[0]||'';
  let valid=true;

  ['fs','ff'].forEach(id=>clearErr(id));
  const te=g('err-time');if(te)te.style.display='none';
  const dtbox=g('datetime-box-el');if(dtbox)dtbox.classList.remove('field-error-box');

  if(!s){markErr('fs');valid=false;}
  if(!f){markErr('ff');valid=false;}

  const type=feederType(f);
  const ir=v('fir'),iy=v('fiy'),ib=v('fib');
  const kv=v('fkv'),tap=v('ftap'),oiltemp=v('foiltemp'),windtemp=v('fwindtemp');

  if(f){
    ['fir','fiy','fib'].forEach(id=>clearErr(id));
    if(!ir){markErr('fir');valid=false;}
    if(!iy){markErr('fiy');valid=false;}
    if(!ib){markErr('fib');valid=false;}
    if(type==='33KV_INCOMER'||type==='11KV_TRAFO'){clearErr('fkv');if(!kv){markErr('fkv');valid=false;}}
    if(type==='11KV_TRAFO'){
      clearErr('ftap');clearErr('foiltemp');clearErr('fwindtemp');
      if(tap===''){markErr('ftap');valid=false;}
      if(!oiltemp){markErr('foiltemp');valid=false;}
      if(!windtemp){markErr('fwindtemp');valid=false;}
    }
  }

  const timeSelected=selectedTime!==null||useCustomTime;
  if(!timeSelected){
    if(te)te.style.display='flex';
    if(dtbox)dtbox.classList.add('field-error-box');
    valid=false;
  }

  if(!valid){
    showToast(false,'Please fill in all required fields marked with ✱');
    const firstErr=document.querySelector('.field-error,.field-error-box');
    if(firstErr)firstErr.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }

  const {date,time,ts}=buildDateAndTime();
  const imax=calcImax(+ir,+iy,+ib);
  let kvForMW=null;
  if(type==='33KV_INCOMER'||type==='11KV_TRAFO') kvForMW=parseFloat(kv)||null;
  else if(type==='33KV_OUT') kvForMW=latestKVFromBatch(s,'33KV');
  else if(type==='11KV_OUT') kvForMW=latestKVFromBatch(s,'11KV');
  const mw=calcMW(kvForMW,imax);

  const entry={
    id:uid(),user:SESSION.id,district:d,sub:s,feeder:f,
    feederType:type,
    ir:+ir,iy:+iy,ib:+ib,imax,mw,
    kv:kv?parseFloat(kv):null,
    tap:type==='11KV_TRAFO'?parseInt(tap):null,
    oiltemp:type==='11KV_TRAFO'?parseFloat(oiltemp):null,
    windtemp:type==='11KV_TRAFO'?parseFloat(windtemp):null,
    remarks:v('fm'),
    date,time,ts,
    synced:false,
    pending:true   // flagged as batch-pending, not yet uploaded
  };

  // Remove any previous batch entry for this feeder (allow editing by re-adding)
  SESSION_BATCH=SESSION_BATCH.filter(e=>!(e.feeder===f&&e.sub===s));
  SESSION_BATCH.push(entry);

  // Capture the time on the FIRST entry of the batch so all subsequent feeders use it
  if(SESSION_BATCH.length===1||BATCH_TIME===null){
    const ct=g('custom-time');
    BATCH_TIME={
      selectedTime,
      useCustomTime,
      customTimeValue:ct?ct.value:'',
      timeLabel:time
    };
  }
  // Do NOT clear selectedTime/useCustomTime — preserved for next feeder via BATCH_TIME restore

  if(goNext){
    const feeders=DB.feeders[s]||[];
    const idx=feeders.indexOf(f);
    const nextFeeder=feeders[idx+1];

    if(nextFeeder){
      showToast(true,`✓ ${f} added — ${SESSION_BATCH.length} entr${SESSION_BATCH.length===1?'y':'ies'} in batch`);
      BATCH_SUB=s;
      BATCH_NEXT_FEEDER=nextFeeder;
      setTimeout(()=>showForm(),800);
    }else{
      // Last feeder — go straight to summary
      showToast(true,`✓ ${f} added — all feeders captured`);
      setTimeout(()=>showSummary(s),800);
    }
  }else{
    // "Add to batch" without advancing — stay on same substation
    showToast(true,`✓ ${f} added to batch (${SESSION_BATCH.length} entr${SESSION_BATCH.length===1?'y':'ies'} total)`);
    BATCH_SUB=s;
    BATCH_NEXT_FEEDER=null; // don't auto-advance feeder, just keep substation
    setTimeout(()=>showForm(),1000);
  }
}

// Get the latest KV from the current SESSION_BATCH (before DB is updated)
function latestKVFromBatch(sub,panel){
  const relevant=SESSION_BATCH.filter(e=>e.sub===sub);
  if(panel==='33KV'){
    const inc=relevant.filter(e=>e.feederType==='33KV_INCOMER'&&e.kv);
    return inc.length?inc[inc.length-1].kv:null;
  }
  if(panel==='11KV'){
    const trf=relevant.filter(e=>e.feederType==='11KV_TRAFO'&&e.kv);
    return trf.length?trf[trf.length-1].kv:null;
  }
  return null;
}

function removeBatchEntry(idx){
  SESSION_BATCH.splice(idx,1);
  if(SESSION_BATCH.length===0){showForm();return;}
  showSummary();
}

function goBackToForm(){
  if(!SESSION_BATCH.length){showForm();return;}
  const s=SESSION_BATCH[0].sub;
  showForm();
  setTimeout(()=>{
    const fsEl=g('fs');
    if(fsEl)fsEl.value=s;
    onSub();
  },150);
}

async function sendBatch(){
  if(!SESSION_BATCH.length)return;
  const btn=g('btn-send-all');
  if(btn){btn.disabled=true;btn.innerHTML='Uploading…';}

  let ok=0,fail=0;
  for(const entry of SESSION_BATCH){
    // Save to local DB
    entry.pending=false;
    DB.submissions.push(entry);
  }
  save();

  // Upload all entries
  if(navigator.onLine){
    for(const entry of SESSION_BATCH){
      try{
        await uploadEntry(entry);
        entry.synced=true;
        ok++;
      }catch(e){fail++;}
    }
    save();
  }else{
    fail=SESSION_BATCH.length;
  }

  const tots=computeTotals(SESSION_BATCH);
  const batchCopy=[...SESSION_BATCH];
  SESSION_BATCH=[];
  BATCH_TIME=null;
  BATCH_SUB=null;
  BATCH_NEXT_FEEDER=null;

  // Show completion screen
  mount(`<div style="max-width:540px;margin:0 auto;padding:1rem">
  ${topbar('Submission complete')}
  <div class="card" style="text-align:center;padding:2rem 1.5rem;margin-bottom:12px">
    <div style="font-size:48px;margin-bottom:8px">${fail===0?'✓':'!'}</div>
    <div style="font-size:17px;font-weight:600;margin-bottom:4px">${fail===0?`All ${batchCopy.length} entries sent successfully`:`${ok} sent, ${fail} saved locally`}</div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px">${batchCopy[0]?.sub||''} — ${batchCopy[0]?.date||''} @ ${batchCopy[0]?.time||''}</div>
    ${fail>0?`<div style="font-size:11px;color:var(--color-text-warning);margin-top:6px">${fail} entr${fail!==1?'ies':'y'} saved locally — will auto-upload when internet returns</div>`:''}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
    <div style="background:#E6F1FB;border-radius:8px;padding:12px;text-align:center">
      <div style="font-size:11px;font-weight:600;color:#0C447C;margin-bottom:4px">TOTAL INCOMERS</div>
      <div style="font-size:20px;font-weight:700;color:#0C447C">${tots.inAmps} A</div>
      <div style="font-size:13px;color:#185FA5;font-weight:500">${tots.inMW} MW</div>
    </div>
    <div style="background:#E2F2EC;border-radius:8px;padding:12px;text-align:center">
      <div style="font-size:11px;font-weight:600;color:#0F6E56;margin-bottom:4px">TOTAL OUTGOINGS</div>
      <div style="font-size:20px;font-weight:700;color:#0F6E56">${tots.outAmps} A</div>
      <div style="font-size:13px;color:#0F6E56;font-weight:500">${tots.outMW} MW</div>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="bp" style="flex:1;padding:11px" onclick="SESSION_BATCH=[];BATCH_TIME=null;BATCH_SUB=null;BATCH_NEXT_FEEDER=null;showForm()">New session</button>
    <button class="bs" style="flex:1;padding:11px" onclick="showHistory()">View history</button>
  </div>

/* ── CHARTS TAB ── fixed: filter state in F_DISTRICT/F_SUB/F_FEEDER, not DOM ── */
function filteredRows(){
  let rows=[...DB.submissions].sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  if(F_DISTRICT)rows=rows.filter(s=>s.district===F_DISTRICT);
  if(F_SUB)rows=rows.filter(s=>s.sub===F_SUB);
  if(F_FEEDER)rows=rows.filter(s=>s.feeder===F_FEEDER);
  return rows;
}
function filterLabel(){
  const p=[];if(F_DISTRICT)p.push(F_DISTRICT);if(F_SUB)p.push(F_SUB);if(F_FEEDER)p.push(F_FEEDER);
  return p.length?p.join(' › '):'All data';
}
function updateSubFilter(){
  const fs=g('cf-sub');if(!fs)return;
  const src=F_DISTRICT?DB.submissions.filter(s=>s.district===F_DISTRICT):DB.submissions;
  const subs=[...new Set(src.map(s=>s.sub))].sort();
  fs.innerHTML=`<option value="">All substations</option>${subs.map(s=>`<option value="${s}"${F_SUB===s?' selected':''}>${s}</option>`).join('')}`;
}
function updateFeederFilter(){
  const ff=g('cf-feeder');if(!ff)return;
  let src=DB.submissions;
  if(F_DISTRICT)src=src.filter(s=>s.district===F_DISTRICT);
  if(F_SUB)src=src.filter(s=>s.sub===F_SUB);
  const feeders=[...new Set(src.map(s=>s.feeder))].sort();
  ff.innerHTML=`<option value="">All feeders</option>${feeders.map(f=>`<option value="${f}"${F_FEEDER===f?' selected':''}>${f}</option>`).join('')}`;
}
function onDistrictFilterChange(){
  F_DISTRICT=v('cf-district');F_SUB='';F_FEEDER='';
  updateSubFilter();updateFeederFilter();drawCharts();updateAlertPanel();
}
function onSubFilterChange(){
  F_SUB=v('cf-sub');F_FEEDER='';

}
function onFeederFilterChange(){

}

function drawCharts(){
  const rows=filteredRows(),c=chartColors();
  const labels=rows.map(s=>fmtShort(s.ts));
  const fl=g('filter-label');
  if(fl)fl.textContent=filterLabel()+' ('+rows.length+' readings)';
  function mk(id,config){const el=g(id);if(!el)return;if(chartInst[id])try{chartInst[id].destroy();}catch(e){}chartInst[id]=new Chart(el,config);}
  if(!rows.length){
    ['ch-trend','ch-mw','ch-bar','ch-temp'].forEach(id=>{const el=g(id);if(!el)return;if(chartInst[id])try{chartInst[id].destroy();}catch(e){}const ctx=el.getContext('2d');ctx.clearRect(0,0,el.width,el.height);ctx.fillStyle=c.text;ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('No data for this filter',el.width/2,el.height/2);});
    return;
  }
  // Phase load trend — IR/IY/IB
  mk('ch-trend',{type:'line',data:{labels,datasets:[
    {label:'IR',data:rows.map(s=>s.ir!=null?s.ir:null),borderColor:c.r,tension:0.3,pointRadius:3,borderWidth:2,fill:false},
    {label:'IY',data:rows.map(s=>s.iy!=null?s.iy:null),borderColor:c.y,tension:0.3,pointRadius:3,borderWidth:2,fill:false},
    {label:'IB',data:rows.map(s=>s.ib!=null?s.ib:null),borderColor:c.b,tension:0.3,pointRadius:3,borderWidth:2,fill:false},
    {label:'Imax',data:rows.map(s=>s.imax!=null?s.imax:null),borderColor:c.avg,borderDash:[5,4],tension:0.3,pointRadius:2,borderWidth:1.5,fill:false},
  ]},options:baseOpts()});
  // MW trend
  mk('ch-mw',{type:'line',data:{labels,datasets:[
    {label:'MW',data:rows.map(s=>s.mw!=null?s.mw:null),borderColor:'#185FA5',backgroundColor:'#185FA522',tension:0.3,pointRadius:3,borderWidth:2,fill:true},
  ]},options:baseOpts()});
  // Average Imax by feeder
  const allF=[...new Set(DB.submissions.map(s=>s.feeder))].sort();
  mk('ch-bar',{type:'bar',data:{labels:allF,datasets:[
    {label:'Avg Imax (A)',data:allF.map(f=>{const fr=DB.submissions.filter(s=>s.feeder===f);const vals=fr.map(s=>+s.imax||0).filter(x=>x>0);return vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):0;}),backgroundColor:c.r,borderRadius:3},
  ]},options:baseOpts()});
  // Transformer temperatures (trafo rows only)
  const trafoRows=rows.filter(s=>isTrafo(s));
  mk('ch-temp',{type:'line',data:{labels:trafoRows.map(s=>fmtShort(s.ts)+' '+s.feeder),datasets:[
    {label:'Oil Temp °C',data:trafoRows.map(s=>s.oiltemp!=null?s.oiltemp:null),borderColor:'#E24B4A',tension:0.3,pointRadius:3,borderWidth:2,fill:false},
    {label:'Winding Temp °C',data:trafoRows.map(s=>s.windtemp!=null?s.windtemp:null),borderColor:'#EF9F27',tension:0.3,pointRadius:3,borderWidth:2,fill:false},
  ]},options:baseOpts()});
}

  rows.forEach(s=>{

    const ot=+s.oiltemp||0, wt=+s.windtemp||0;
    if(ot>=70||wt>=75)high.push({...s,ot,wt});
    else if(ot>=60||wt>=65)med.push({...s,ot,wt});
  });
  ap.innerHTML=`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">

async function syncAllToSheet(){
  const btn=g('sync-btn'),status=g('sync-status');
  const pending=pendingEntries();
  if(!pending.length){
    if(status){status.textContent='✓ All entries already synced — nothing to upload.';status.style.color='var(--color-text-success)';}
    return;
  }
  if(btn){btn.disabled=true;btn.innerHTML='<span aria-hidden="true">⏳</span> Syncing…';}
  if(status){status.textContent='';status.style.color='';}
  const r=await processSyncQueue();
  if(btn){btn.disabled=false;btn.innerHTML='<span aria-hidden="true">☁⬆</span> Sync pending to Google Sheet';}
  if(status){
    status.textContent=r.fail===0?`✓ ${r.ok} pending record${r.ok!==1?'s':''} synced to Google Sheet`:`⚠ ${r.ok} synced, ${r.fail} failed — check internet`;
    status.style.color=r.fail===0?'var(--color-text-success)':'var(--color-text-warning)';
  }
  renderSubs(); // refresh table to show updated sync status
}

async function saveEditUser(oldId){
  const ni=v('eu-id').trim().toUpperCase(),np=v('eu-pw').trim(),esub=v('eu-sub'),nr=v('eu-role'),phone=v('eu-phone').trim(),name=v('eu-name').trim();
  if(!ni){alert('Username cannot be empty.');return;}
  if(ni!==oldId&&DB.users.find(u=>u.id===ni)){alert('Username already taken.');return;}
  if(np&&np.length<6){alert('Password must be at least 6 characters.');return;}
  const idx=DB.users.findIndex(u=>u.id===oldId);
  DB.submissions.forEach(s=>{if(s.user===oldId)s.user=ni;});
  DB.users[idx].id=ni;
  if(np){DB.users[idx].pw=await sha256(np);}
  DB.users[idx].name=name;
  if(!DB.users[idx].substations)DB.users[idx].substations=DB.users[idx].districts||[];
  DB.users[idx].phone=phone;
  DB.users[idx].substations=esub?[esub]:[];
  DB.users[idx].role=nr;
  if(SESSION.id===oldId)SESSION=DB.users[idx];
  save();renderUsers();
}
async function addUser(){
  const id=v('nuid').trim().toUpperCase(),pw=v('nupw').trim(),nsub=v('nusub'),phone=v('nuphone').trim(),name=v('nuname').trim();
  if(!id||!pw){alert('Username and password required.');return;}
  if(pw.length<6){alert('Password must be at least 6 characters.');return;}
  if(DB.users.find(u=>u.id===id)){alert('Username already exists.');return;}
  const hashed=await sha256(pw);
  DB.users.push({id,pw:hashed,role:'user',name,phone,substations:nsub?[nsub]:[]});
  save();renderUsers();
}
function delUser(id){if(!confirm(`Delete user ${id}?`))return;DB.users=DB.users.filter(u=>u.id!==id);save();renderUsers();}


/* ── HIERARCHY TAB ── */
function renderHier(){
  const tb=g('tab-body');if(!tb)return;
  const allSubs=Object.entries(DB.subs).flatMap(([d,ss])=>ss.map(s=>({d,s})));
  if(!DB.subVoltage)DB.subVoltage={};
  tb.innerHTML=`<div class="r2" style="gap:1rem">
  <div>
    <div class="sl">Districts</div>
    <div style="display:flex;gap:6px;margin-bottom:8px"><input id="ndn" placeholder="New district" style="flex:1"><button class="bp bs" onclick="addDist()"><span aria-hidden="true">+</span></button></div>
    <div style="display:flex;flex-direction:column;gap:4px">${DB.districts.map(d=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:13px"><span>${d}</span><button class="bs bd" onclick="delDist('${d}')"><span aria-hidden="true">🗑</span></button></div>`).join('')}</div>
    <div style="margin-top:14px"><div class="sl">Add substation</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <select id="nsd"><option value="">Select district</option>${DB.districts.map(d=>`<option>${d}</option>`).join('')}</select>
        <div style="display:flex;gap:6px"><input id="nsn" placeholder="Substation name" style="flex:1"><button class="bp bs" onclick="addSub()"><span aria-hidden="true">+</span></button></div>
        <select id="nsv"><option value="33+11">33KV + 11KV</option><option value="33">33KV only</option></select>
      </div>
    </div>
  </div>
  <div>
    <div class="sl">Add feeder</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">
      <select id="nfs"><option value="">Select substation</option>${Object.keys(DB.feeders).map(s=>`<option>${s}</option>`).join('')}</select>
      <div style="display:flex;gap:6px"><input id="nfn" placeholder="Feeder name" style="flex:1"><button class="bp bs" onclick="addFeeder()"><span aria-hidden="true">+</span></button></div>
    </div>
    <div class="sl">All feeders</div>
    <div style="max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;margin-bottom:14px">
      ${Object.entries(DB.feeders).flatMap(([sub,fds])=>fds.map(fd=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:12px"><span><span style="color:var(--color-text-secondary)">${sub}/</span>${fd}</span><button class="bs bd" onclick="delFeeder('${sub}','${fd}')"><span aria-hidden="true">🗑</span></button></div>`)).join('')||'<div class="empty" style="padding:0.5rem">No feeders yet.</div>'}
    </div>
    <div class="sl">All substations — voltage configuration</div>
    <div style="max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:3px">
      ${allSubs.map(({d,s})=>{
        const vLevel=DB.subVoltage[s]||'33+11';
        return`<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 8px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:12px">
          <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis"><span style="color:var(--color-text-secondary)">${d}/</span>${s}</span>
          <select onchange="setSubVoltage('${s}',this.value)" style="width:120px;font-size:11px;padding:3px 6px">
            <option value="33+11" ${vLevel==='33+11'?'selected':''}>33KV+11KV</option>
            <option value="33" ${vLevel==='33'?'selected':''}>33KV only</option>
          </select>
          <button class="bs bd" onclick="delSub('${d}','${s}')"><span aria-hidden="true">🗑</span></button>
        </div>`;
      }).join('')}
    </div>
  </div></div>`;
}
function setSubVoltage(sub,level){
  if(!DB.subVoltage)DB.subVoltage={};
  DB.subVoltage[sub]=level;
  save();
  showToast(true,`${sub} set to ${level==='33'?'33KV only':'33KV + 11KV'}`);
}
function addDist(){const n=v('ndn').trim().toUpperCase();if(!n)return;if(DB.districts.includes(n)){alert('Exists.');return;}DB.districts.push(n);if(!DB.subs[n])DB.subs[n]=[];save();renderHier();}
function delDist(d){
  const subCount=(DB.subs[d]||[]).length;
  const entryCount=DB.submissions.filter(s=>s.district===d).length;
  let msg=`Delete district "${d}"?`;
  if(subCount>0)msg+=` This also removes its ${subCount} substation${subCount===1?'':'s'} and their feeders from the lists.`;
  if(entryCount>0)msg+=` ${entryCount} past entr${entryCount===1?'y':'ies'} reference this district and will remain in records/exports but the district will no longer be selectable.`;
  if(!confirm(msg))return;
  DB.districts=DB.districts.filter(x=>x!==d);
  (DB.subs[d]||[]).forEach(s=>{delete DB.feeders[s];if(DB.subVoltage)delete DB.subVoltage[s];});
  delete DB.subs[d];
  save();renderHier();
}
function delSub(d,s){
  const feederCount=(DB.feeders[s]||[]).length;
  const entryCount=DB.submissions.filter(x=>x.sub===s).length;
  let msg=`Delete substation "${s}"?`;
  if(feederCount>0)msg+=` This also removes its ${feederCount} feeder${feederCount===1?'':'s'} from the list.`;
  if(entryCount>0)msg+=` ${entryCount} past entr${entryCount===1?'y':'ies'} reference this substation and will remain in records/exports but it will no longer be selectable.`;
  if(!confirm(msg))return;
  DB.subs[d]=(DB.subs[d]||[]).filter(x=>x!==s);
  delete DB.feeders[s];
  if(DB.subVoltage)delete DB.subVoltage[s];
  save();renderHier();
}
function addSub(){const d=v('nsd'),n=v('nsn').trim().toUpperCase(),vl=v('nsv');if(!d||!n)return;if(!DB.subs[d])DB.subs[d]=[];if(DB.subs[d].includes(n)){alert('Exists.');return;}DB.subs[d].push(n);if(!DB.feeders[n])DB.feeders[n]=[];if(!DB.subVoltage)DB.subVoltage={};DB.subVoltage[n]=vl;save();renderHier();}
function addFeeder(){const s=v('nfs'),n=v('nfn').trim().toUpperCase();if(!s||!n)return;if(!DB.feeders[s])DB.feeders[s]=[];if(DB.feeders[s].includes(n)){alert('Exists.');return;}DB.feeders[s].push(n);save();renderHier();}
function delFeeder(sub,feeder){
  const usedCount=DB.submissions.filter(s=>s.feeder===feeder&&s.sub===sub).length;
  const msg=usedCount>0
    ?`"${feeder}" has ${usedCount} recorded entr${usedCount===1?'y':'ies'}. Deleting it from the list won't remove past data, but field officers won't be able to select it again. Continue?`
    :`Delete feeder "${feeder}"?`;
  if(!confirm(msg))return;
  DB.feeders[sub]=(DB.feeders[sub]||[]).filter(x=>x!==feeder);
  save();renderHier();
}

DB=load();

// Migrate: old entries without a synced flag are assumed already uploaded
let migrated=false;
DB.submissions.forEach(s=>{if(s.synced===undefined){s.synced=true;migrated=true;}});
if(migrated)save();

// Start the offline sync auto-retry engine
startSyncEngine();

// Hash any plain-text passwords on startup (passwords not starting with hex-64 chars are plain text)
const HEX64=/^[0-9a-f]{64}$/;
async function initPasswords(){
  let changed=false;
  for(const u of DB.users){
    if(!HEX64.test(u.pw)){
      u.pw=await sha256(u.pw);
      changed=true;
    }
  }
  // Migrate old district-based users to substation-based
  let migrated2=false;
  DB.users.forEach(u=>{if(!u.substations){u.substations=[];migrated2=true;}});
  if(migrated2)save();
  if(changed)save();
  showLogin();
}
initPasswords();
</script>
