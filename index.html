<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>ECG Substation Load System</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font-sans)}
input,select{width:100%;padding:9px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--color-border-info);box-shadow:0 0 0 2px rgba(24,95,165,0.12)}
button{font-family:var(--font-sans);font-size:13px;cursor:pointer;padding:7px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button:hover{background:var(--color-background-secondary)}
button:active{opacity:0.8}
.bp{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:500}.bp:hover{background:#0C447C}
.bd{background:var(--color-background-danger);color:var(--color-text-danger);border-color:var(--color-border-danger)}
.bsuc{background:var(--color-background-success);color:var(--color-text-success);border-color:var(--color-border-success)}
.bs{padding:6px 10px;font-size:12px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.1rem}
.lbl{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;font-weight:500}
.fg{margin-bottom:14px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tab{padding:8px 12px;border:none;background:none;cursor:pointer;font-size:13px;border-bottom:2px solid transparent;color:var(--color-text-secondary);border-radius:0;white-space:nowrap}
.tab.on{color:var(--color-text-info);border-bottom-color:#185FA5;font-weight:500}
.tab:hover:not(.on){background:var(--color-background-secondary)}
.tab-bar-wrap{display:flex;overflow-x:auto;border-bottom:0.5px solid var(--color-border-tertiary);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar-wrap::-webkit-scrollbar{display:none}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:5px 8px;text-align:left;font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary)}
td{padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;font-size:11px;padding:1px 7px;border-radius:20px;font-weight:500}
.bb{background:#E6F1FB;color:#0C447C}.bg2{background:#EAF3DE;color:#27500A}
.ba{background:#FAEEDA;color:#633806}.br{background:#FCEBEB;color:#791F1F}
.bam{background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595}
.bok{background:#EAF3DE;color:#3B6D11;border:0.5px solid #97C459}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center}
.metric .v{font-size:22px;font-weight:500}.metric .l{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
.err{background:var(--color-background-danger);color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);padding:7px 10px;font-size:12px;margin-bottom:10px}
.ok{background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-md);padding:7px 10px;font-size:12px;margin-bottom:10px}
.sl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-secondary);margin-bottom:8px}
.empty{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:13px}
.alert-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:var(--border-radius-md);margin-bottom:6px;font-size:12px}
.alert-high{background:#FCEBEB;border:0.5px solid #F09595}
.alert-med{background:#FAEEDA;border:0.5px solid #FAC775}
.export-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:14px;border:0.5px solid var(--color-border-tertiary)}
.datetime-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:14px}
.field-error{border-color:#E24B4A!important;box-shadow:0 0 0 2px rgba(226,75,74,0.15)!important}
.field-error-msg{font-size:11px;color:#A32D2D;margin-top:3px;display:flex;align-items:center;gap:3px}
.req-star{color:#E24B4A;margin-left:2px}
.toast-popup{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 18px;border-radius:var(--border-radius-lg);font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,0.18);animation:toastIn .25s ease;width:90%;max-width:420px}
.toast-success-pop{background:#EAF3DE;color:#27500A;border:0.5px solid #97C459}
.toast-fail-pop{background:#FCEBEB;color:#791F1F;border:0.5px solid #F09595}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.datetime-box.field-error-box{border-color:#E24B4A!important;box-shadow:0 0 0 2px rgba(226,75,74,0.15)}
.live-clock{font-size:26px;font-weight:500;letter-spacing:0.04em;color:var(--color-text-primary);font-variant-numeric:tabular-nums}
.live-date{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.time-slots{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.time-slot{padding:7px 14px;font-size:13px;border-radius:20px;border:0.5px solid var(--color-border-secondary);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);min-width:64px;text-align:center;-webkit-tap-highlight-color:transparent}
.time-slot:hover{border-color:var(--color-border-info);color:var(--color-text-info)}
.time-slot.selected{background:#185FA5;color:#fff;border-color:#185FA5}
.time-slot.custom-active{background:#0F6E56;color:#fff;border-color:#0F6E56}
.filter-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:end;padding:10px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary)}
.filter-info{font-size:11px;padding:4px 8px;background:var(--color-background-info);color:var(--color-text-info);border-radius:var(--border-radius-md);align-self:flex-end}
#root{padding:0 0 2rem}

/* ── MOBILE BREAKPOINT ── */
@media(max-width:600px){
  input,select{font-size:16px;padding:10px 12px} /* 16px prevents iOS zoom */
  button{padding:9px 14px;font-size:13px}
  .bs{padding:8px 12px;font-size:13px}
  .card{padding:.9rem}
  .r2{grid-template-columns:1fr} /* stack 2-col grids */
  .r3{grid-template-columns:1fr} /* stack 3-col grids */
  .metrics-grid{grid-template-columns:1fr 1fr} /* 2x2 on mobile */
  .live-clock{font-size:32px}
  .live-date{font-size:13px}
  .time-slot{padding:9px 14px;font-size:13px;min-width:70px}
  .tab{padding:10px 12px;font-size:12px}
  .export-bar{flex-direction:column;align-items:stretch}
  .export-bar button,.export-bar span{width:100%;text-align:center}
  .filter-bar{flex-direction:column}
  .filter-bar>div{width:100%}
  .filter-bar select{width:100%}
  .alert-row{flex-direction:column;gap:6px}
  .topbar-btns{flex-wrap:wrap}
  .topbar-btns button{flex:1;min-width:80px;text-align:center;justify-content:center}
  th{font-size:10px;padding:4px 6px}
  td{font-size:11px;padding:5px 6px}
  .metric .v{font-size:18px}
  .metric{padding:10px 6px}
}

.mode-toggle{display:flex;gap:0;margin-bottom:1rem;border-radius:var(--border-radius-md);overflow:hidden;border:1.5px solid var(--color-border-secondary)}
.mode-btn{flex:1;padding:10px 14px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:var(--color-background-secondary);color:var(--color-text-secondary);transition:all .15s;border-radius:0}
.mode-btn.active-33{background:#185FA5;color:#fff}
.mode-btn.active-11{background:#0F6E56;color:#fff}
.feeder-grid{display:grid;gap:8px;margin-bottom:10px}
.feeder-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;border:0.5px solid var(--color-border-tertiary)}
.feeder-card.filled{border-color:var(--color-border-success);background:var(--color-background-success)}
.feeder-card.active-card{border-color:#185FA5;background:var(--color-background-info)}
.feeder-card-11.filled{border-color:var(--color-border-success);background:var(--color-background-success)}
.feeder-card-11.active-card{border-color:#0F6E56;background:var(--color-background-success)}
.inp-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));gap:6px;margin-top:8px}
.inp-mini label{font-size:10px;color:var(--color-text-secondary);display:block;margin-bottom:2px;font-weight:500}
.inp-mini input,.inp-mini select{padding:5px 7px;font-size:13px;width:100%}
.inp-mini .auto{background:var(--color-background-secondary);color:var(--color-text-secondary);font-style:italic}
</style>
</head>

const PF=0.90;

function calcImax(r,y,b){return Math.max(+r||0,+y||0,+b||0);}

// ── SHA-256 ──
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

const MAX_ATT=3,LOCK_MS=5*60*1000;
function isLocked(u){const k=u.toLowerCase();if(LOCK.until[k]&&Date.now()<LOCK.until[k])return true;if(LOCK.until[k]){delete LOCK.until[k];delete LOCK.att[k];}return false;}
function recFail(u){const k=u.toLowerCase();LOCK.att[k]=(LOCK.att[k]||0)+1;if(LOCK.att[k]>=MAX_ATT){LOCK.until[k]=Date.now()+LOCK_MS;delete LOCK.att[k];}}
function recOk(u){const k=u.toLowerCase();delete LOCK.att[k];delete LOCK.until[k];}
function lockMsg(u){const k=u.toLowerCase();const r=Math.ceil((LOCK.until[k]-Date.now())/1000);return`Locked. Try again in ${Math.floor(r/60)}m ${r%60}s.`;}
function remAtt(u){return MAX_ATT-(LOCK.att[u.toLowerCase()]||0);}

// ── Offline sync ──
let SYNC_RUNNING=false;
function pendingRows(){return(DB.reports||[]).filter(r=>r.synced===false);}
function pendingCount(){return pendingRows().length;}

async function uploadRow(row){
  const url=row.mode==='33'?SHEETS_URL_33:SHEETS_URL_11;
  if(!url)return;
  await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(row)});
}
async function processSyncQueue(){
  if(SYNC_RUNNING||!navigator.onLine)return{ok:0,fail:pendingCount()};
  SYNC_RUNNING=true;let ok=0,fail=0;
  try{
    for(const r of pendingRows()){
      try{await uploadRow(r);r.synced=true;ok++;}catch(e){fail++;}
    }
    if(ok>0)save();
  }finally{SYNC_RUNNING=false;}
  return{ok,fail};
}

function showLogin(err){
  mount(`<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem">
  <div class="card" style="width:100%;max-width:340px">
    <div style="text-align:center;margin-bottom:1.4rem">

      <div style="font-size:11px;color:var(--color-text-secondary);margin-top:3px">ELECTRICITY COMPANY OF GHANA LTD.</div>
      <div style="font-size:11px;color:var(--color-text-secondary)">Western Region</div>
    </div>
    ${err?`<div class="err">${err}</div>`:''}
    <div class="fg"><label class="lbl">Username</label><input id="lu" autocomplete="username"></div>
    <div class="fg"><label class="lbl">Password</label><input id="lp" type="password" autocomplete="current-password"></div>
    <button class="bp" style="width:100%" onclick="doLogin()">Sign in</button>
    <div style="font-size:11px;color:var(--color-text-secondary);text-align:center;margin-top:10px">Locked ${MAX_ATT} min after ${MAX_ATT} failed attempts</div>
  </div></div>`);
  g('lu').onkeydown=e=>{if(e.key==='Enter')g('lp').focus();};
  g('lp').onkeydown=e=>{if(e.key==='Enter')doLogin();};
}

async function doLogin(){
  const u=v('lu'),p=v('lp');
  if(!u||!p){showLogin('Enter username and password.');return;}
  if(isLocked(u)){showLogin(lockMsg(u));return;}
  const hashed=await sha256(p);
  const found=DB.users.find(x=>x.id.toLowerCase()===u.toLowerCase()&&x.pw===hashed);
  if(!found){recFail(u);showLogin(isLocked(u)?lockMsg(u):`Incorrect credentials. ${remAtt(u)} attempt(s) remaining.`);return;}
  recOk(u);SESSION=found;BATCH={};BATCH_TIME=null;BATCH_SUB=null;
  processSyncQueue();
  found.role==='admin'?showAdmin():showForm();
}

function liveCalc(fid){
  const r=parseFloat(g(`f_${fid}_r`)?.value)||0;
  const y=parseFloat(g(`f_${fid}_y`)?.value)||0;
  const b=parseFloat(g(`f_${fid}_b`)?.value)||0;
  const imax=calcImax(r,y,b);
  const imaxEl=g(`f_${fid}_imax`);if(imaxEl)imaxEl.value=imax||'';
  const kvEl=g(`f_${fid}_kv`);
  const mwEl=g(`f_${fid}_mw`);
  if(kvEl&&mwEl){
    const kv=parseFloat(kvEl.value)||null;
    const mw=calcMW(kv,imax);
    mwEl.value=mw!==null?mw:'';
  }
}

function saveFeeder(fid){
  const f=([...F33,...F11]).find(x=>x.id===fid);
  if(!f)return;
  const r=v(`f_${fid}_r`),y=v(`f_${fid}_y`),b=v(`f_${fid}_b`);
  if(!r||!y||!b){showToast(false,'Enter R, Y and B readings.');return;}
  const imax=calcImax(+r,+y,+b);
  const kv=v(`f_${fid}_kv`)||null;
  const mw=calcMW(kv,imax);
  const entry={r:+r,y:+y,b:+b,imax};
  if(f.type==='inc'||f.type==='trafo'){
    if(!kv){showToast(false,'Enter kV for this feeder.');return;}
    entry.kv=+kv;entry.mw=mw;
  }
  if(f.type==='trafo'){
    const tap=v(`f_${fid}_tap`),ot=v(`f_${fid}_ot`),wt=v(`f_${fid}_wt`);
    if(!tap||!ot||!wt){showToast(false,'Enter TAP, Oil Temp and Winding Temp.');return;}
    entry.tap=+tap;entry.ot=+ot;entry.wt=+wt;
  }
  // Lock time on first feeder
  if(!BATCH_TIME){
    const t=v('btime')||nowStr();
    BATCH_TIME=t;
  }
  BATCH[fid]=entry;
  showToast(true,`${f.label} added`);
  showForm();
}

function skipFeeder(fid){
  BATCH[fid]={skipped:true,r:0,y:0,b:0,imax:0};
  showForm();
}

function editFeeder(fid){
  delete BATCH[fid];
  showForm();

  setTimeout(()=>{const el=g('fc_'+fid);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},100);

// ── Build the wide row object matching Excel format ──
function buildRow33(){
  const date=fmtDMY(today());
  const sub=SESSION.substation||'STATION A BSP';
  const dist=Object.entries(DB.subs||{}).find(([d,ss])=>ss.includes(sub))?.[0]||'SEKONDI';
  const row={mode:'33',district:dist,substation:sub,date,time:BATCH_TIME||nowStr()};

  // Incomers for MW calculation
  let kv33=null;
  ['INCOMER_2','INCOMER_1','INCOMER_3'].forEach(id=>{
    if(BATCH[id]&&BATCH[id].kv)kv33=BATCH[id].kv;
  });

  F33.forEach(f=>{
    const d=BATCH[f.id]||{};
    const imax=d.imax||0;
    row[f.id+'_r']=d.r||0;
    row[f.id+'_y']=d.y||0;
    row[f.id+'_b']=d.b||0;
    row[f.id+'_imax']=imax;
    if(f.type==='inc'){
      row[f.id+'_kv']=d.kv||'';
      row[f.id+'_mw']=d.mw||'';
    }
    // outgoing feeders: no individual MW — total MW calculated at end
  });

  // Totals
  const outgoings=F33.filter(f=>f.type!=='inc');
  const incomers=F33.filter(f=>f.type==='inc');
  const totalOutAmps=outgoings.reduce((s,f)=>s+(BATCH[f.id]?.imax||0),0);
  const totalOutMW=calcMW(kv33,totalOutAmps)||0;
  const totalIncAmps=incomers.reduce((s,f)=>s+(BATCH[f.id]?.imax||0),0);
  const totalIncMW=+incomers.reduce((s,f)=>s+(parseFloat(BATCH[f.id]?.mw)||0),0).toFixed(3);
  row.total_out_amps=totalOutAmps;
  row.total_out_mw=totalOutMW;
  row.total_inc_amps=totalIncAmps;
  row.total_inc_mw=totalIncMW;
  return row;
}

function buildRow11(){
  const date=fmtDMY(today());
  const sub=SESSION.substation||'STATION A BSP';
  const dist=Object.entries(DB.subs||{}).find(([d,ss])=>ss.includes(sub))?.[0]||'SEKONDI';
  const row={mode:'11',district:dist,substation:sub,date,time:BATCH_TIME||nowStr()};

  let kv11=null;
  ['TRAFO_1','TRAFO_2'].forEach(id=>{if(BATCH[id]?.kv)kv11=BATCH[id].kv;});

  F11.forEach(f=>{
    const d=BATCH[f.id]||{};
    const imax=d.imax||0;
    row[f.id+'_r']=d.r||0;
    row[f.id+'_y']=d.y||0;
    row[f.id+'_b']=d.b||0;
    row[f.id+'_imax']=imax;
    if(f.type==='trafo'){
      row[f.id+'_kv']=d.kv||'';
      row[f.id+'_mw']=d.mw||'';
      row[f.id+'_tap']=d.tap||'';
      row[f.id+'_ot']=d.ot||'';
      row[f.id+'_wt']=d.wt||'';
    }else{
      const mw=calcMW(kv11,imax);
      row[f.id+'_mw']=mw||'';
    }
  });

  const outgoing=F11.filter(f=>f.type==='out');
  const trafos=F11.filter(f=>f.type==='trafo');
  row.total_out_amps=outgoing.reduce((s,f)=>s+(BATCH[f.id]?.imax||0),0);
  row.total_out_mw=+outgoing.reduce((s,f)=>s+(parseFloat(row[f.id+'_mw'])||0),0).toFixed(3);
  row.total_trafo_amps=trafos.reduce((s,f)=>s+(BATCH[f.id]?.imax||0),0);
  row.total_trafo_mw=+trafos.reduce((s,f)=>s+(parseFloat(BATCH[f.id]?.mw)||0),0).toFixed(3);
  return row;
}

async function sendAll(){
  const btn=g('btn-send-all');
  if(btn){btn.disabled=true;btn.innerHTML='Uploading…';}
  const row=MODE==='33'?buildRow33():buildRow11();
  row.id=uid();row.user=SESSION.id;row.synced=false;
  if(!DB.reports)DB.reports=[];
  DB.reports.push(row);save();
  if(navigator.onLine){
    try{await uploadRow(row);row.synced=true;save();}catch(e){}
  }
  const ok=row.synced;
  const feeders=MODE==='33'?F33:F11;
  const filled=feeders.filter(f=>BATCH[f.id]&&!BATCH[f.id].skipped).length;
  const color=MODE==='33'?'#185FA5':'#0F6E56';
  const tot=MODE==='33'?buildRow33():buildRow11();

  // Reset batch
  BATCH={};BATCH_TIME=null;

  mount(`<div style="max-width:480px;margin:0 auto;padding:1rem">
  ${topbar((MODE==='33'?'33KV':'11KV')+' — Complete')}
  <div class="card" style="text-align:center;padding:2rem 1.5rem;margin-bottom:12px">
    <div style="font-size:48px;margin-bottom:8px">${ok?'✓':'!'}</div>
    <div style="font-size:17px;font-weight:600;margin-bottom:4px">${ok?`${filled} feeders uploaded`:`Saved locally — will upload when online`}</div>
    <div style="font-size:12px;color:var(--color-text-secondary)">${row.substation} — ${row.date} @ ${row.time}</div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
    <div style="background:#E6F1FB;border-radius:8px;padding:12px;text-align:center">
      <div style="font-size:11px;font-weight:600;color:#0C447C;margin-bottom:2px">${MODE==='33'?'TOTAL INCOMERS':'TOTAL TRAFO'}</div>
      <div style="font-size:18px;font-weight:700;color:#0C447C">${MODE==='33'?tot.total_inc_amps:tot.total_trafo_amps} A</div>
      <div style="font-size:12px;color:#185FA5">${MODE==='33'?tot.total_inc_mw:tot.total_trafo_mw} MW</div>
    </div>
    <div style="background:#E2F2EC;border-radius:8px;padding:12px;text-align:center">
      <div style="font-size:11px;font-weight:600;color:#0F6E56;margin-bottom:2px">TOTAL OUTGOING</div>
      <div style="font-size:18px;font-weight:700;color:#0F6E56">${tot.total_out_amps} A</div>
      <div style="font-size:12px;color:#0F6E56">${tot.total_out_mw} MW</div>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="bp" style="flex:1;padding:11px" onclick="showForm()">New session</button>
    <button class="bs" style="flex:1;padding:11px" onclick="showHistory()">View history</button>
  </div></div>`);
}

// ── Change password ──
function showChangePw(msg,err){
  mount(`<div style="max-width:400px;margin:0 auto;padding:1.2rem 1rem">
  ${topbar('Credentials')}
  <div class="card">
    ${err?`<div class="err">${err}</div>`:''}${msg?`<div class="ok">${msg}</div>`:''}
    <div class="fg"><label class="lbl">Full Name</label><input id="cname" value="${SESSION.name||''}"></div>
    <div class="fg"><label class="lbl">Phone</label><input id="cphone" type="tel" value="${SESSION.phone||''}"></div>
    <div class="fg"><label class="lbl">Current password</label><input id="cp" type="password"></div>
    <div class="fg"><label class="lbl">New password (blank=keep)</label><input id="np" type="password"></div>
    <div class="fg" style="margin-bottom:16px"><label class="lbl">Confirm new</label><input id="cnp" type="password"></div>
    <div style="display:flex;gap:8px">
      <button class="bp" style="flex:1" onclick="doChangePw()">Update</button>
      <button onclick="${SESSION.role==='admin'?'showAdmin()':'showForm()'}">Cancel</button>
    </div>
  </div></div>`);
}
async function doChangePw(){
  const cp=v('cp'),np=v('np'),cn=v('cnp'),name=v('cname'),phone=v('cphone');
  const hashedCurrent=await sha256(cp);
  if(hashedCurrent!==SESSION.pw){showChangePw('','Current password incorrect.');return;}
  const idx=DB.users.findIndex(u=>u.id===SESSION.id);
  if(np){
    if(np.length<6){showChangePw('','Min 6 characters.');return;}
    if(np!==cn){showChangePw('','Passwords do not match.');return;}
    DB.users[idx].pw=await sha256(np);
  }
  DB.users[idx].name=name;DB.users[idx].phone=phone;
  SESSION=DB.users[idx];save();
  showChangePw('Updated successfully.','');
}

function delRow(id){if(!confirm('Delete?'))return;DB.reports=(DB.reports||[]).filter(r=>r.id!==id);save();renderAdminSubs();}

async function syncAllAdmin(){
  const r=await processSyncQueue();
  showToast(r.fail===0,`${r.ok} synced${r.fail?', '+r.fail+' failed':''}`);
  renderAdminSubs();
}

function exportAllCSV(){
  const rows=DB.reports||[];
  if(!rows.length){showToast(false,'No data to export.');return;}
  // Dynamic CSV: all keys from first row
  const keys33=['district','substation','date','time',...F33.flatMap(f=>f.type==='inc'?[f.id+'_kv',f.id+'_r',f.id+'_y',f.id+'_b',f.id+'_imax',f.id+'_mw']:[f.id+'_r',f.id+'_y',f.id+'_b',f.id+'_imax']),'total_out_amps','total_out_mw','total_inc_amps','total_inc_mw'];
  const keys11=['district','substation','date','time',...F11.flatMap(f=>f.type==='trafo'?[f.id+'_kv',f.id+'_r',f.id+'_y',f.id+'_b',f.id+'_imax',f.id+'_mw',f.id+'_tap',f.id+'_ot',f.id+'_wt']:[f.id+'_r',f.id+'_y',f.id+'_b',f.id+'_imax',f.id+'_mw']),'total_out_amps','total_out_mw','total_trafo_amps','total_trafo_mw'];
  ['33','11'].forEach(mode=>{
    const mRows=rows.filter(r=>r.mode===mode);
    if(!mRows.length)return;
    const keys=mode==='33'?keys33:keys11;
    const lines=[keys.join(','),...mRows.map(r=>keys.map(k=>{const val=r[k]!=null?String(r[k]):'';return val.includes(',')?`"${val}"`:val;}).join(','))];
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(lines.join('\n'));
    a.download=`${mode}KV_load_data.csv`;a.click();
  });
}

function editUser(uid){
  const u=DB.users.find(x=>x.id===uid);if(!u)return;
  const row=g('urow-'+uid);if(!row)return;
  const allSubs=Object.values(DB.subs||{}).flat();
  const subOpts=allSubs.map(s=>`<option value="${s}" ${u.substation===s?'selected':''}>${s}</option>`).join('');
  row.innerHTML=`<td colspan="7"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;padding:6px 0;align-items:end">
    <div><label class="lbl">Full Name</label><input id="eu-name" value="${u.name||''}"></div>
    <div><label class="lbl">Username</label><input id="eu-id" value="${u.id}"></div>
    <div><label class="lbl">Password (blank=keep)</label><input id="eu-pw" type="password"></div>
    <div><label class="lbl">Substation</label><select id="eu-sub"><option value="">All</option>${subOpts}</select></div>
    <div><label class="lbl">Phone</label><input id="eu-phone" type="tel" value="${u.phone||''}"></div>
    <div><label class="lbl">Role</label><select id="eu-role"><option value="user" ${u.role==='user'?'selected':''}>user</option><option value="admin" ${u.role==='admin'?'selected':''}>admin</option></select></div>
    <div style="display:flex;gap:6px;margin-top:14px">
      <button class="bp" onclick="saveUser('${uid}')">Save</button>
      <button onclick="renderAdminUsers()">Cancel</button>
    </div>
  </div></td>`;
}
async function saveUser(oldId){
  const ni=v('eu-id').trim().toUpperCase(),np=v('eu-pw').trim(),nr=v('eu-role'),phone=v('eu-phone').trim(),name=v('eu-name').trim(),sub=v('eu-sub');
  if(!ni){alert('Username required.');return;}
  if(ni!==oldId&&DB.users.find(u=>u.id===ni)){alert('Username taken.');return;}
  if(np&&np.length<6){alert('Min 6 chars.');return;}
  const idx=DB.users.findIndex(u=>u.id===oldId);
  (DB.reports||[]).forEach(r=>{if(r.user===oldId)r.user=ni;});
  DB.users[idx].id=ni;DB.users[idx].name=name;DB.users[idx].phone=phone;
  DB.users[idx].substation=sub;DB.users[idx].role=nr;
  if(np)DB.users[idx].pw=await sha256(np);
  if(SESSION.id===oldId)SESSION=DB.users[idx];
  save();renderAdminUsers();
}
async function addUser(){
  const id=v('nuid').trim().toUpperCase(),pw=v('nupw').trim(),name=v('nuname').trim(),phone=v('nuphone').trim(),sub=v('nusub');
  if(!id||!pw){alert('Username and password required.');return;}
  if(pw.length<6){alert('Min 6 chars.');return;}
  if(DB.users.find(u=>u.id===id)){alert('Username exists.');return;}
  DB.users.push({id,pw:await sha256(pw),role:'user',name,phone,substation:sub});
  save();renderAdminUsers();
}
function delUser(id){if(!confirm(`Delete ${id}?`))return;DB.users=DB.users.filter(u=>u.id!==id);save();renderAdminUsers();}

// ── Startup ──
DB=load();
async function init(){
  let changed=false;
  for(const u of DB.users){if(!HEX64.test(u.pw)){u.pw=await sha256(u.pw);changed=true;}}
  if(!DB.reports)DB.reports=[];
  if(changed)save();
  window.addEventListener('online',()=>{
    processSyncQueue().then(r=>{if(r.ok>0)showToast(true,r.ok+' row(s) uploaded.');});
  });
  setInterval(()=>{if(pendingCount()>0)processSyncQueue();},2*60*1000);
  showLogin();
}
init();
